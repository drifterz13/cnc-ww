services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: wow
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: concert_wow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8.8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    volumes:
      - insight_store:/data

volumes:
  postgres_data:
  redis_data:
  insight_store:
