name: concert-wow-prod

x-api-runtime-environment: &api-runtime-environment
  DATABASE_URL: &database-url "${DATABASE_URL:-postgresql://wow:P%40ssw0rd@postgres:5432/concert_wow?schema=public}"

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: wow
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: concert_wow
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wow -d concert_wow"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-setup:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
      args:
        DATABASE_URL: *database-url
    environment:
      DATABASE_URL: *database-url
      SEED_PASSWORD: ${SEED_PASSWORD:-Password123!}
    depends_on:
      postgres:
        condition: service_healthy
    command:
      ["sh", "-c", "pnpm --filter @concert-wow/api exec prisma migrate deploy && pnpm --filter @concert-wow/api db:seed"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        DATABASE_URL: *database-url
    environment:
      <<: *api-runtime-environment
      JWT_SECRET: ${JWT_SECRET:-mysecret}
      SEED_PASSWORD: ${SEED_PASSWORD:-Password123!}
    depends_on:
      db-setup:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_URL: http://api:3000
    depends_on:
      api:
        condition: service_started
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  postgres_data:
