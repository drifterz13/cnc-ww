services:
  app:
    build:
      context: .
      target: development
      args:
        DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://wow:P%40ssw0rd@postgres:5432/concert_wow?schema=public}
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://wow:P%40ssw0rd@postgres:5432/concert_wow?schema=public}
      JWT_SECRET: ${JWT_SECRET:-development-jwt-secret}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      SEED_PASSWORD: ${SEED_PASSWORD:-Password123!}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: wow
      POSTGRES_PASSWORD: P@ssw0rd
      POSTGRES_DB: concert_wow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8.8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
